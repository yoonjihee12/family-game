<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>가족 구성 챌린지 - 모둠 활동</title>
    <style>
        :root { --main-bg: #f8f9fa; --card-bg: #ffffff; --primary: #5c67f2; --accent: #ff6b6b; }
        body { font-family: 'Pretendard', sans-serif; background: var(--main-bg); margin: 0; color: #333; overflow: hidden; }
        
        /* 인트로 화면 */
        #intro-screen { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--primary); color: white; display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 9999; }
        #intro-screen h1 { font-size: 2.5rem; margin-bottom: 20px; }
        .intro-box { background: white; padding: 40px; border-radius: 20px; text-align: center; color: #333; box-shadow: 0 10px 25px rgba(0,0,0,0.2); }
        .intro-box input { padding: 12px; width: 250px; font-size: 1.2rem; border: 2px solid #ddd; border-radius: 10px; margin-bottom: 25px; text-align: center; }
        .btn-start { background: var(--accent); color: white; border: none; padding: 15px 50px; font-size: 1.3rem; border-radius: 10px; cursor: pointer; font-weight: bold; }

        /* 게임 화면 */
        #game-container { display: none; flex-direction: column; height: 100vh; width: 100%; }
        header { background: var(--primary); color: white; padding: 15px 25px; display: flex; justify-content: space-between; align-items: center; }
        
        main { display: flex; flex: 1; overflow: hidden; gap: 15px; padding: 15px; }
        #inventory { width: 320px; background: var(--card-bg); border-radius: 15px; padding: 15px; overflow-y: auto; display: grid; grid-template-columns: 1fr 1fr; gap: 12px; border: 1px solid #e0e0e0; }
        .person-card { background: #fff; border-radius: 10px; padding: 8px; cursor: grab; text-align: center; font-size: 13px; border: 1px solid #eee; }
        .person-card img { width: 100%; height: 90px; object-fit: cover; border-radius: 6px; pointer-events: none; }
        .person-card.used { opacity: 0.2; cursor: not-allowed; filter: grayscale(1); }

        #workspace { flex: 1; display: flex; flex-direction: column; gap: 15px; }
        #drop-zone { flex: 1; background: #fff; border: 3px dashed #cbd5e0; border-radius: 15px; display: flex; flex-wrap: wrap; gap: 12px; padding: 25px; align-content: flex-start; overflow-y: auto; position: relative; }
        #drop-zone:empty::before { content: "사진을 여기로 드래그하세요"; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); color: #a0aec0; }

        #control-panel { background: #fff; padding: 20px; border-radius: 15px; border: 1px solid #e0e0e0; display: flex; flex-direction: column; gap: 10px; }
        .form-row { display: flex; gap: 10px; }
        input[type="text"] { padding: 10px; border-radius: 8px; border: 1px solid #ddd; flex: 1; }
        .btn-confirm { background: var(--primary); color: white; border: none; padding: 10px 20px; border-radius: 8px; cursor: pointer; font-weight: bold; }
        .btn-submit { background: #28a745; color: white; border: none; padding: 15px; border-radius: 10px; font-weight: bold; cursor: pointer; font-size: 1.1rem; }

        #result-list { max-height: 100px; overflow-y: auto; background: #f7fafc; padding: 10px; border-radius: 10px; font-size: 13px; }
        .temp-member { width: 75px; height: 105px; position: relative; }
        .remove-btn { position: absolute; top: -5px; right: -5px; background: var(--accent); color: white; border: none; border-radius: 50%; width: 20px; height: 20px; cursor: pointer; }
    </style>
</head>
<body>

<div id="intro-screen">
    <h1>👨‍👩‍👧‍👦 가족 구성 챌린지</h1>
    <div class="intro-box">
        <p>우리 모둠은 몇 모둠인가요?</p>
        <input type="text" id="team-input" placeholder="예: 3모둠">
        <button class="btn-start" onclick="startGame()">게임 시작하기</button>
    </div>
</div>

<div id="game-container">
    <header>
        <h2 id="display-team-name" style="margin:0;">모둠 활동</h2>
        <div style="font-weight: bold;">완성된 가족: <span id="count">0</span>개</div>
    </header>

    <main>
        <div id="inventory"></div>
        <div id="workspace">
            <div id="drop-zone" ondrop="drop(event)" ondragover="allowDrop(event)"></div>
            <div id="control-panel">
                <div class="form-row">
                    <input type="text" id="family-type" placeholder="가족 형태 직접 입력">
                    <input type="text" id="family-desc" placeholder="구성 조합 설명">
                    <button class="btn-confirm" onclick="confirmFamily()">가족 확정</button>
                </div>
                <div id="result-list"><div id="items-container"></div></div>
                <button class="btn-submit" onclick="submitToSheet()">🏁 최종 결과 전송하기</button>
            </div>
        </div>
    </main>
</div>

<script>
    // 선생님의 최신 스크립트 URL 반영
    const scriptURL = "https://script.google.com/macros/s/AKfycbxsJJoItMkkci1eWhZdQ1Qz4kfXYSJfxpe61BAZ85S5DUipU4mbvYkMjDyiiXDsSab7Xw/exec";

    let teamName = "";
    let currentMembers = [];
    let submittedFamilies = [];

    const personNames = ["신구", "부승관", "유이진", "조나단", "김강훈", "오해원", "라미란", "박해준", "한효주", "전현무", "고윤정", "나문희", "문상훈", "카니", "박은빈", "유해진", "박지훈"];
    
    window.onload = function() {
        const inv = document.getElementById('inventory');
        personNames.forEach((name, i) => {
            const id = `p${i+1}`;
            const div = document.createElement('div');
            div.className = 'person-card';
            div.id = id;
            div.draggable = true;
            div.ondragstart = (ev) => { ev.dataTransfer.setData("text", ev.target.id); };
            div.innerHTML = `<img src="${id}.jpg" alt="${name}"><p>${name}</p>`;
            inv.appendChild(div);
        });
    };

    function startGame() {
        const val = document.getElementById('team-input').value.trim();
        if(!val) { alert("모둠명을 입력해주세요!"); return; }
        teamName = val;
        document.getElementById('display-team-name').innerText = `🔥 ${teamName} 활동 중`;
        document.getElementById('intro-screen').style.display = 'none';
        document.getElementById('game-container').style.display = 'flex';
    }

    function allowDrop(ev) { ev.preventDefault(); }
    function drop(ev) {
        ev.preventDefault();
        const id = ev.dataTransfer.getData("text");
        const el = document.getElementById(id);
        if(!el || el.classList.contains('used')) return;
        el.classList.add('used');
        currentMembers.push(id);
        renderDropZone();
    }

    function removeMember(id) {
        document.getElementById(id).classList.remove('used');
        currentMembers = currentMembers.filter(m => m !== id);
        renderDropZone();
    }

    function renderDropZone() {
        const dz = document.getElementById('drop-zone');
        dz.innerHTML = "";
        currentMembers.forEach(id => {
            const el = document.getElementById(id);
            const clone = el.cloneNode(true);
            clone.className = 'person-card temp-member';
            clone.innerHTML += `<button class="remove-btn" onclick="removeMember('${id}')">✕</button>`;
            dz.appendChild(clone);
        });
    }

    function confirmFamily() {
        const type = document.getElementById('family-type').value.trim();
        const desc = document.getElementById('family-desc').value.trim();
        if(!type || currentMembers.length === 0) { alert("내용을 입력하세요!"); return; }
        
        submittedFamilies.push({ type, desc, count: currentMembers.length });
        const item = document.createElement('div');
        item.innerHTML = `<b>${submittedFamilies.length}. ${type}</b> (${desc})`;
        document.getElementById('items-container').prepend(item);

        currentMembers = [];
        document.getElementById('drop-zone').innerHTML = "";
        document.getElementById('family-type').value = "";
        document.getElementById('family-desc').value = "";
        document.getElementById('count').innerText = submittedFamilies.length;
    }

    function submitToSheet() {
        if(submittedFamilies.length === 0) return;
        if(!confirm("최종 제출하시겠습니까?")) return;

        const detailsText = submittedFamilies.map((f, i) => `${i+1}.${f.type}(${f.desc})`).join(" / ");
        
        fetch(scriptURL, {
            method: 'POST',
            mode: 'no-cors',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ 
                teamName: teamName, 
                count: submittedFamilies.length, 
                details: detailsText 
            })
        }).then(() => {
            alert("제출 완료! 수고하셨습니다.");
            location.reload();
        }).catch(e => alert("오류: " + e.message));
    }
</script>
</body>
</html>
